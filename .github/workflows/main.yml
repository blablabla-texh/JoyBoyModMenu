name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/theos:latest # Utilise l'environnement officiel pré-installé
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Build Package
        run: |
          # Dans ce conteneur, THEOS est déjà configuré
          # On installe juste les outils de base si besoin
          export THEOS=/theos
          make package FINALPACKAGE=1
        env:
          THEOS: /theos

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: packages/*.deb
