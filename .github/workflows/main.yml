name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl perl git libssl-dev

      - name: Setup Theos
        run: |
          # On installe Theos proprement
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # On télécharge juste LE fichier SDK nécessaire au lieu de tout cloner
          mkdir -p ~/theos/sdks
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C ~/theos/sdks/
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Package
        run: |
          export THEOS=~/theos
          # On lance la compilation finale
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: ./*.deb
