name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Theos
        uses: RandomHashCoding/theos-action@v1

      - name: Build Package
        run: |
          make package FINALPACKAGE=1
