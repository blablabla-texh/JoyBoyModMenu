name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Theos Action Build
        uses: msrv-dev/theos-action@v1.3
        with:
          theos_sdks: https://github.com/theos/sdks/archive/master.tar.gz

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu
          path: packages/*.deb
