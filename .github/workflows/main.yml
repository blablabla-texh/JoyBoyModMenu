name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/theos:latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Build Package
        run: |
          git config --global --add safe.directory $GITHUB_WORKSPACE
          
          # Téléchargement forcé des headers Substrate (pour éviter l'erreur rouge)
          curl -L https://github.com/theos/headers/archive/master.tar.gz | tar -xz -C /theos/include --strip-components=1
          
          export THEOS=/theos
          # On compile
          make package FINALPACKAGE=1
          
          # On donne les droits pour l'artifact
          chown -R 1001:127 .
        working-directory: ${{ github.workspace }}

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: packages/*.deb
