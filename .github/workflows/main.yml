name: JoyBoy-Final-Build
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git curl
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o $HOME/theos/sdks/sdk.tar.xz
          tar -xf $HOME/theos/sdks/sdk.tar.xz -C $HOME/theos/sdks
          curl -L https://github.com/theos/headers/archive/master.tar.gz | tar -xz -C $HOME/theos/include --strip-components=1

      - name: Build
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
        
      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoy-Menu-Final
          path: packages/*.deb

