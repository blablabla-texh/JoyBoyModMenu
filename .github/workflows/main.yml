name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Setup Theos and Build
        uses: msrv-dev/theos-action@main
        with:
          theos-src: https://github.com/theos/theos.git
          sdk-url: https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
        env:
          THEOS_PACKAGE_SCHEME: rootless # Ou supprime cette ligne si tu veux du non-rootless
          FINALPACKAGE: 1

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: packages/*.deb
