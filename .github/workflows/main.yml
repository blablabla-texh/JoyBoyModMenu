name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Build with Theos Action
        uses: theo-com/theos-action@v1
        with:
          theos-sdks: https://github.com/theos/sdks # Il va essayer de le gérer en interne
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          FINALPACKAGE: 1
