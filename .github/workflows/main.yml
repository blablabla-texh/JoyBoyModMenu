name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git libssl-dev xz-utils

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          # On télécharge la Toolchain (les outils)
          curl -L https://github.com/theos/toolchain/releases/download/linux-arm64/toolchain-linux-arm64.tar.xz -o toolchain.tar.xz
          mkdir -p ~/theos/toolchain/linux/iphone
          tar -xJf toolchain.tar.xz -C ~/theos/toolchain/linux/iphone
          
          # On télécharge un SDK léger et fiable (iOS 12.2)
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS12.2.sdk.tar.xz -o sdk.tar.xz
          tar -xJf sdk.tar.xz -C ~/theos/sdks/
          
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Build Package
        run: |
          export THEOS=~/theos
          # On dit à Theos d'utiliser le SDK qu'on vient de mettre
          make package FINALPACKAGE=1 SDKPATH=~/theos/sdks/iPhoneOS12.2.sdk
