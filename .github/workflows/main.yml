name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/theos:latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Build Package
        run: |
          # 1. Autoriser Git
          git config --global --add safe.directory $GITHUB_WORKSPACE
          
          # 2. Compiler (on utilise le SDK inclus dans l'image)
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
          
          # 3. FIX DES PERMISSIONS (Indispensable pour Docker)
          # On redonne les droits à l'utilisateur standard pour l'artifact
          chown -R 1001:127 .
        working-directory: ${{ github.workspace }}

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: packages/*.deb
