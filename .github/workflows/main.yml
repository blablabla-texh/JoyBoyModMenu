name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Install Theos & Tools
        run: |
          # Installation de Theos
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          
          # Téléchargement du SDK via un miroir plus fiable
          mkdir -p $HOME/theos/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C $HOME/theos/sdks --strip-components=1
          
          # Téléchargement des Headers Substrate
          curl -L https://github.com/theos/headers/archive/master.tar.gz | tar -xz -C $HOME/theos/include --strip-components=1

      - name: Build Package
        run: |
          export THEOS=$HOME/theos
          export PATH=$THEOS/bin:$PATH
          # On compile pour les jailbreaks modernes (Dopamine/Palera1n)
          make package FINALPACKAGE=1 THEOS_PACKAGE_SCHEME=rootless
        
      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: packages/*.deb
