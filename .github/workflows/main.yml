name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git libssl-dev xz-utils

      - name: Setup Everything
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/home/runner/theos" >> $GITHUB_ENV
          echo "/home/runner/theos/bin" >> $GITHUB_PATH

      - name: Build Package
        run: |
          export THEOS=/home/runner/theos
          export PATH=$THEOS/bin:$PATH
          
          # On vérifie ce qui existe vraiment dans le dossier sdks
          echo "--- Liste des SDKs trouvés ---"
          ls -R $THEOS/sdks
          
          # On lance la compilation en disant à Theos d'ignorer ses doutes
          # On lui donne le chemin direct vers le premier SDK qu'il trouve
          make package FINALPACKAGE=1 SDKPATH=$(ls -d $THEOS/sdks/*.sdk | head -n 1)
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: ./*.deb
