name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl perl git libssl-dev xz-utils

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          mkdir -p ~/theos/sdks
          # Nouveau lien direct vers un SDK 14.5 fiable
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" -o sdk.tar.xz
          # On vérifie si le téléchargement est complet (doit faire plus de 1 Mo)
          if [ $(stat -c%s sdk.tar.xz) -lt 1000000 ]; then echo "Erreur téléchargement"; exit 1; fi
          tar -xJf sdk.tar.xz -C ~/theos/sdks/

      - name: Build Package
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: ./*.deb
