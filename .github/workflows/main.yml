name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential perl git libssl-dev xz-utils

      - name: Setup Theos & Toolchain
        run: |
          # On utilise le script qui a marché !
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=/home/runner/theos" >> $GITHUB_ENV
          echo "/home/runner/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK
        run: |
          # On télécharge le SDK proprement dans le dossier créé par le script
          curl -LO https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz
          tar -xJf iPhoneOS14.5.sdk.tar.xz -C /home/runner/theos/sdks
          rm iPhoneOS14.5.sdk.tar.xz

      - name: Build Package
        run: |
          export THEOS=/home/runner/theos
          # On compile le projet
          make package FINALPACKAGE=1
        env:
          THEOS: /home/runner/theos

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: ./*.deb
