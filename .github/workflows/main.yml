name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl perl git libssl-dev xz-utils

      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          echo "THEOS=~/theos" >> $GITHUB_ENV
          echo "~/theos/bin" >> $GITHUB_PATH

      - name: Setup SDK (Alternative Method)
        run: |
          mkdir -p ~/theos/sdks
          # On utilise un lien direct vers un SDK déjà extrait ou plus facile à gérer
          curl -L "https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz" --output sdk.tar.xz
          # On vérifie la taille du fichier pour être sûr
          du -sh sdk.tar.xz
          tar -xJf sdk.tar.xz -C ~/theos/sdks/

      - name: Build Package
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
        env:
          THEOS: ~/theos

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: ./*.deb
