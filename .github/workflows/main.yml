name: Build Tweak
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/theos:latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4

      - name: Build Package
        run: |
          # 1. Autoriser Git
          git config --global --add safe.directory $GITHUB_WORKSPACE
          
          # 2. On installe les headers manquants (Substrate) au cas où
          curl -L https://github.com/theos/headers/archive/master.tar.gz | tar -xz -C /theos/include --strip-components=1
          
          # 3. Compiler
          # On retire le mode rootless temporairement pour voir si ça passe en standard
          export THEOS=/theos
          make package FINALPACKAGE=1
          
          # 4. Fix des permissions pour l'artifact
          chown -R 1001:127 .
        working-directory: ${{ github.workspace }}

      - name: Upload Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: JoyBoyModMenu-Package
          path: packages/*.deb
